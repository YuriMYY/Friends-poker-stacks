<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Poker Stack Planner — Output per-player chips & conversion</title>
<style>
  :root{--bg:#fbfbfc;--muted:#666;--accent:#0a66cc;--warn:#fff0f2;--card:#fff}
  body{font-family:system-ui,-apple-system,Segoe UI,Roboto,"Hiragino Kaku Gothic ProN","Meiryo",sans-serif;margin:12px;background:var(--bg);color:#111}
  h1{font-size:1.05rem;margin:0 0 6px}
  label{display:block;margin-top:10px;font-weight:700}
  input, button{padding:10px;border:1px solid #e6e6e6;border-radius:8px;font-size:1rem}
  input[type="number"]{width:160px}
  button{background:var(--accent);color:#fff;border:0;cursor:pointer}
  .grid{display:grid;grid-template-columns:1fr 380px;gap:14px}
  .chip-table{width:100%;border-collapse:collapse;margin-top:8px}
  .chip-table th, .chip-table td{padding:8px;border-bottom:1px solid #eee;text-align:left}
  .result{margin-top:14px;padding:12px;border-radius:10px;background:var(--card);border:1px solid #eee}
  .warn{color:#a00;background:var(--warn);padding:10px;border-radius:8px;margin-top:8px;border:1px solid #f5c}
  .mono{font-family:monospace;background:#f7f7f7;padding:6px;border-radius:6px;display:inline-block}
  @media(max-width:880px){ .grid{grid-template-columns:1fr} input[type="number"]{width:100%} }
</style>
</head>
<body>
  <h1>Poker Stack Planner — per-player chip output & conversion</h1>
  <p class="muted">Outputs per-player chip counts by denomination, nominal total (額面上) and actual $ value + conversion factor.</p>

  <div class="grid">
    <div>
      <label>Players</label>
      <input id="players" type="number" min="1" value="6" />

      <label>Actual buy-in per player ($) — optional (if set, conversion will be shown)</label>
      <input id="actualBuyin" type="number" min="0" step="0.01" placeholder="e.g. 50" />

      <label>Target starting BB (e.g. 30) — used to suggest Big Blind in chip-points</label>
      <input id="targetBB" type="number" min="1" value="30" />

      <div style="margin-top:12px"><button id="calc" style="width:100%">Calculate & show per-player breakdown</button></div>

      <div id="advice" style="margin-top:10px"></div>
    </div>

    <div>
      <div style="padding:10px;background:#fff;border-radius:8px;border:1px solid #eee">
        <h3 style="margin:0 0 8px">Inventory summary</h3>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <div style="flex:1">
            <div class="muted">Total pieces</div><div id="totalPieces" style="font-weight:700">—</div>
          </div>
          <div style="flex:1">
            <div class="muted">Total nominal (額面上)</div><div id="totalNominal" style="font-weight:700">—</div>
          </div>
          <div style="flex:1">
            <div class="muted">Equal-share max per player (nominal)</div><div id="maxNominal" style="font-weight:700">—</div>
          </div>
        </div>
      </div>

      <div style="margin-top:12px">
        <label>Chips — denomination (nominal) and count</label>
        <table class="chip-table" id="chipTable">
          <thead><tr><th>Denom (nominal)</th><th>Count</th><th>Total (nominal)</th></tr></thead>
          <tbody id="chipBody"></tbody>
        </table>
        <div style="margin-top:8px;display:flex;gap:8px">
          <button id="addDenom">Add denom</button>
          <button id="resetDenoms" style="background:#888">Reset defaults</button>
        </div>
      </div>
    </div>
  </div>

  <div id="output" class="result" style="display:none"></div>

<script>
/* defaults */
let defaultDenoms = [1,2,5,25,50,100];
let defaultCounts = [50,50,50,30,20,10];
let chipBody = document.getElementById('chipBody');

function renderChipRows(denoms){
  chipBody.innerHTML = '';
  denoms.forEach((d,i) => {
    let tr = document.createElement('tr');
    tr.innerHTML = `
      <td><input class="denom" data-i="${i}" type="number" value="${d}" min="1" style="width:80px" /></td>
      <td><input class="count" data-i="${i}" type="number" min="0" value="${defaultCounts[i] || 0}" style="width:80px" /></td>
      <td class="total" data-i="${i}">0</td>
    `;
    chipBody.appendChild(tr);
  });
  updateTotalsDisplay();
}
renderChipRows(defaultDenoms);

document.getElementById('addDenom').addEventListener('click', () => {
  defaultDenoms.push(10); defaultCounts.push(0); renderChipRows(defaultDenoms);
});
document.getElementById('resetDenoms').addEventListener('click', () => {
  defaultDenoms = [1,2,5,25,50,100]; defaultCounts = [50,50,50,30,20,10]; renderChipRows(defaultDenoms);
});
chipBody.addEventListener('input', updateTotalsDisplay);

function updateTotalsDisplay(){
  let rows = chipBody.querySelectorAll('tr');
  rows.forEach(tr => {
    let denom = Number(tr.querySelector('.denom').value) || 0;
    let count = Number(tr.querySelector('.count').value) || 0;
    tr.querySelector('.total').textContent = (denom * count).toLocaleString();
  });
}

/* helper allocation (respect actual pieces) */
function allocatePerPlayer(targetNominal, denoms, counts, players){
  // greedy from large denom to small, but limited by floor(count/players)
  let items = denoms.map((d,i)=>({d:d, count:counts[i], idx:i})).sort((a,b)=>b.d-a.d);
  let perPlayer = Array(denoms.length).fill(0);
  let remaining = targetNominal;

  for (let it of items){
    let maxEach = Math.floor(it.count / players);
    if (maxEach <= 0) continue;
    let needEach = Math.floor(remaining / it.d);
    let give = Math.min(maxEach, needEach);
    perPlayer[it.idx] = give;
    remaining -= give * it.d;
  }
  // fill with smaller if remaining>0
  if (remaining > 0){
    let asc = items.slice().sort((a,b)=>a.d-b.d);
    for (let it of asc){
      if (remaining <= 0) break;
      let maxEach = Math.floor(it.count / players);
      let already = perPlayer[it.idx] || 0;
      while(already < maxEach && remaining >= it.d){
        already++; remaining -= it.d;
      }
      perPlayer[it.idx] = already;
    }
  }
  return {perPlayerCounts: perPlayer, remainderPerPlayer: remaining};
}

/* main */
document.getElementById('calc').addEventListener('click', () => {
  const players = Math.max(1, Math.floor(Number(document.getElementById('players').value) || 1));
  const actualBuyin = Math.max(0, Number(document.getElementById('actualBuyin').value) || 0);
  const targetBB = Math.max(1, Number(document.getElementById('targetBB').value) || 30);

  // read denoms & counts
  let denomEls = Array.from(document.querySelectorAll('.denom'));
  let countEls = Array.from(document.querySelectorAll('.count'));
  let denoms = denomEls.map(e=>Math.max(1, Math.floor(Number(e.value) || 0)));
  let counts = countEls.map(e=>Math.max(0, Math.floor(Number(e.value) || 0)));

  // totals
  let totalPieces = counts.reduce((s,c)=>s+c,0);
  let totalNominal = denoms.reduce((s,d,i)=>s + d*counts[i], 0);
  let maxNominalPer = Math.floor(totalNominal / players);

  document.getElementById('totalPieces').textContent = totalPieces.toLocaleString();
  document.getElementById('totalNominal').textContent = totalNominal.toLocaleString();
  document.getElementById('maxNominal').textContent = maxNominalPer.toLocaleString();

  // decide target nominal per player:
  // try to aim for equal-share max
  let targetNominal = maxNominalPer;

  // attempt allocation
  let alloc = allocatePerPlayer(targetNominal, denoms, counts, players);
  let perPlayerCounts = alloc.perPlayerCounts;
  let achievedNominal = perPlayerCounts.reduce((s,c,i)=> s + c * denoms[i], 0);
  let remainder = alloc.remainderPerPlayer;

  // compute conversion factor if actualBuyin provided
  // conversion = actualBuyin / achievedNominal  => 1 nominal-unit (1 of the denom unit) = $conversion
  let conversion = (actualBuyin > 0 && achievedNominal > 0) ? (actualBuyin / achievedNominal) : null;
  // If conversion present, compute "to convert chip denom to $ multiply by conversion"
  // Also compute Big blind suggestion in nominal units:
  let rawBig = achievedNominal / Math.max(1, targetBB);
  // pick nearest denom <= rawBig for big (so blind is representable)
  let sortedDenoms = denoms.slice().map(v=>Math.max(1,v)).sort((a,b)=>a-b);
  function floorToDenom(val){
    let cand = sortedDenoms.filter(d=>d <= Math.max(1, Math.floor(val)));
    return cand.length ? cand[cand.length-1] : sortedDenoms[0];
  }
  let bigNominal = floorToDenom(rawBig);
  let smallNominal = Math.max(1, Math.round(bigNominal/2));

  // create output
  let out = document.getElementById('output');
  out.style.display = 'block';
  out.innerHTML = '';

  // Per-player breakdown list (the format you asked for)
  let lines = '<strong>Per-player stack (by denom)</strong><ul>';
  for (let i=0;i<denoms.length;i++){
    lines += `<li>${denoms[i]}-unit: <b>${perPlayerCounts[i]}</b> pcs</li>`;
  }
  lines += `</ul>`;
  out.insertAdjacentHTML('beforeend', lines);

  // Totals & conversion
  out.insertAdjacentHTML('beforeend', `<p><strong>Nominal per-player total (額面上):</strong> ${achievedNominal.toLocaleString()}</p>`);

  if (conversion !== null){
    // show both 1 nominal = $X and multiplier form
    out.insertAdjacentHTML('beforeend', `<p><strong>Actual buy-in provided:</strong> $${actualBuyin.toFixed(2)}</p>
      <p><strong>Conversion:</strong> 1 nominal-unit = $${conversion.toFixed(4)} <br>
      (To convert a chip's nominal value → real $, multiply by <b>${conversion.toFixed(4)}</b>.)</p>`);
    // show example: total nominal -> actual
    out.insertAdjacentHTML('beforeend', `<p><strong>Check:</strong> Nominal ${achievedNominal.toLocaleString()} × ${conversion.toFixed(4)} ≈ $${(achievedNominal*conversion).toFixed(2)}</p>`);
  } else {
    out.insertAdjacentHTML('beforeend', `<p class="muted">No Actual buy-in entered — enter a $ value to see conversion (e.g. $50).</p>`);
  }

  // show suggested blinds (nominal units) and BB depth
  let bbDepth = (achievedNominal / Math.max(1, bigNominal)).toFixed(1);
  out.insertAdjacentHTML('beforeend', `<h3>Suggested blinds (nominal)</h3>
    <p>Big Blind: <b>${bigNominal}</b> (Small ≈ ${smallNominal})</p>
    <p>Stack depth: <b>${bbDepth} BB</b> ( ${achievedNominal} ÷ ${bigNominal} )</p>`);

  // warnings
  if (remainder > 0){
    out.insertAdjacentHTML('beforeend', `<div class="warn">Allocation left a remainder of <b>${remainder}</b> nominal pts per player (small fractional shortfall). Top up with small chips or slightly reduce target.</div>`);
  }
  if (achievedNominal < Math.max(100, targetBB*10)){
    out.insertAdjacentHTML('beforeend', `<div class="warn">Per-player nominal (${achievedNominal}) is small for deep play. Consider lowering target BB or adding chips.</div>`);
  }
  if (perPlayerCounts.some((c,i)=> c > Math.floor(counts[i]/players))){
    out.insertAdjacentHTML('beforeend', `<div class="warn">Note: requested per-player counts exceed available pieces for some denominations. Check your counts.</div>`);
  }

  // debug
  out.insertAdjacentHTML('beforeend', `<details style="margin-top:8px"><summary>Debug</summary>
    <div class="mono" style="margin-top:8px">
totalNominal=${totalNominal}
maxNominalPer=${maxNominalPer}
achievedNominal=${achievedNominal}
rawBig=${rawBig.toFixed(2)}
bigNominal=${bigNominal}
conversion=${conversion===null? 'N/A' : conversion.toFixed(6)}
    </div></details>`);
});
</script>
</body>
</html>
